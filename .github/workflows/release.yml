name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libproj-dev libtiff-dev libssl-dev

      - name: Build
        run: cmake -S . -B build && cmake --build build -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rerun-loader-ulog-linux-x86_64
          path: build/rerun-loader-ulog/rerun-loader-ulog

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rerun-loader-ulog-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: rerun-loader-ulog
          generate_release_notes: true
